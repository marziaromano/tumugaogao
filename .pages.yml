  "aboutIt": "Artista poliedrico nato a Napoli nel 1992, ha tracciato il suo percorso attraverso diverse espressioni artistiche. Inizialmente influenzato dall'astrattismo e dall'informale, ha gradualmente esplorato la street art, i graffiti e la pittura murale, introducendo nuovi elementi e codici nel suo linguaggio espressivo.\n\nNegli ultimi anni il suo interesse indaga anche la ceramica, una nuova frontiera che esplora con originalità e passione.\n\nLo stile di Tumu GaoGao si distingue per un primitivismo moderno, dove il segno gestuale e i ritmi espressionisti si fondono in una ricerca continua di significato e di connessione con la natura e la sfera primordiale/ancestrale. Alla base della ricerca vi è la sintesi, l'anelito del vuoto, il desiderio di indagare atmosfere, esseri, e paesaggi appartenenti ad una natura dimenticata e incontaminata.\n\nVive e lavora nei Campi Flegrei (Napoli) a stretto contatto con la natura, la spiritualità e le arti marziali.",
  "aboutEn": "A multidisciplinary artist born in Naples in 1992, Tumu GaoGao has developed his practice across a variety of artistic languages. Initially influenced by abstraction and Art Informel, he gradually expanded his research into street art, graffiti, and mural painting, introducing new elements and visual codes into his expressive vocabulary.\n\nIn recent years, his exploration has also extended to ceramics, a new medium he approaches with originality and passion, opening further possibilities within his artistic investigation.\n\nTumu GaoGao's work is characterized by a form of modern primitivism, where gestural marks and expressionist rhythms converge in an ongoing search for meaning and for a deeper connection with nature and the primordial, ancestral sphere. At the core of his research lies a drive toward synthesis, a tension toward emptiness, and a desire to evoke atmospheres, beings, and landscapes belonging to a forgotten and unspoiled nature.\n\nHe lives and works in the Campi Flegrei, near Naples, in close contact with nature, spirituality, and the practice of martial arts."
